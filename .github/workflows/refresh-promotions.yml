name: Refresh Promotions

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-promotions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh data
        run: npm run update:promotions

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: refresh-artifacts
          path: artifacts/
          if-no-files-found: warn

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data reports
          git commit -m "chore(data): refresh promotions"
          git push
